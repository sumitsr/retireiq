version: '3.8'

services:
  db:
    image: ${DB_IMAGE:-ankane/pgvector:v0.5.1}
    container_name: ${DB_CONTAINER_NAME:-retireiq_db}
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retireiq_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - retireiq_network

  app:
    build: .
    container_name: ${APP_CONTAINER_NAME:-retireiq_app}
    restart: always
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-retireiq_db}
      - FLASK_APP=${FLASK_APP:-run.py}
      - FLASK_ENV=${FLASK_ENV:-development}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    depends_on:
      - db
    volumes:
      - .:/app
    networks:
      - retireiq_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  retireiq_network:
    driver: bridge

volumes:
  postgres_data:
